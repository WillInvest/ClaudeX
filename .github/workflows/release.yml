name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag matches all declared versions
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          plugin_ver=$(jq -r .version .claude-plugin/plugin.json)
          mp_ver=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          pkg_ver=$(jq -r .version package.json)
          fail=0
          for pair in "plugin.json:$plugin_ver" "marketplace.json:$mp_ver" "package.json:$pkg_ver"; do
            name="${pair%%:*}"
            ver="${pair##*:}"
            if [ "$tag" != "$ver" ]; then
              echo "Tag $tag does not match $name version $ver"
              fail=1
            fi
          done
          [ "$fail" = "0" ] || exit 1
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --title "ClaudeX $GITHUB_REF_NAME"
